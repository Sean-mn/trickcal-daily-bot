services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redisdata:/data

  bot:
    image: seanyee1227/trickcal-daily-bot:${BOT_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redisdata:
