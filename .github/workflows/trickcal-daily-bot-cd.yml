name: trickcal daily bot CD

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Calculate Version
        id: version
        run: |
          DATE=$(date -u +"%Y%m%d")
          EXISTING=$(git tag -l "v${DATE}.*" | wc -l | tr -d ' ')
          VERSION="v${DATE}.${EXISTING}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create Tag
        run: git tag ${{ steps.version.outputs.version }}

      - name: Push Tag
        run: git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes $'## 수정내역\n\n- '

  deploy:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          persist-credentials: false

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t seanyee1227/trickcal-daily-bot:${{ needs.release.outputs.version }} \
            -t seanyee1227/trickcal-daily-bot:latest \
            .

      - name: Push Docker Image
        run: |
          docker push seanyee1227/trickcal-daily-bot:${{ needs.release.outputs.version }}
          docker push seanyee1227/trickcal-daily-bot:latest

      - name: Copy Deploy Files to Server
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/"
          target: "~/deploy/"
          strip_components: 1

      - name: Deploy via Docker Compose
        uses: appleboy/ssh-action@334f9259f2f8eb3376d33fa4c684fff373f2c2a6 # appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/deploy

            printf 'DISCORD_TOKEN=%s\nCLIENT_ID=%s\nPOSTGRES_PASSWORD=%s\nDATABASE_URL=%s\nREDIS_URL=%s\nDISCORD_WEBHOOK_URL=%s\nNAVER_BOARD_API_URL=%s\nNAVER_ARTICLE_API_BASE_URL=%s\nBOT_IMAGE_TAG=%s\n' \
              "${{ secrets.DISCORD_TOKEN }}" \
              "${{ secrets.CLIENT_ID }}" \
              "${{ secrets.POSTGRES_PASSWORD }}" \
              "${{ secrets.DATABASE_URL }}" \
              "${{ secrets.REDIS_URL }}" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}" \
              "${{ secrets.NAVER_BOARD_API_URL }}" \
              "${{ secrets.NAVER_ARTICLE_API_BASE_URL }}" \
              "${{ needs.release.outputs.version }}" \
              > ~/deploy/.env

            docker compose -f ~/deploy/docker-compose.prod.yml --env-file ~/deploy/.env pull
            docker compose -f ~/deploy/docker-compose.prod.yml --env-file ~/deploy/.env up -d

            sleep 5
            CONTAINER_ID=$(docker compose -f ~/deploy/docker-compose.prod.yml --env-file ~/deploy/.env ps -q bot)
            if [ -z "$CONTAINER_ID" ]; then
              echo "ERROR: Bot container not running"
              exit 1
            fi
            docker logs "$CONTAINER_ID" --tail 20
            docker inspect --format='{{.State.Status}}' "$CONTAINER_ID" | grep -q "running" || exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [release, deploy]
    if: always()
    permissions: {}

    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_CD_WEBHOOK }}
          status: ${{ needs.deploy.result }}
          title: "trickcal-daily-bot CD"
          description: |
            Released `${{ needs.release.outputs.version }}` · by **${{ github.actor }}**
            **Release:** ${{ needs.release.result }}
            **Deploy:** ${{ needs.deploy.result }}
